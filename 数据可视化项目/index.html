<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茶韵数观-中国古代茶文化图鉴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SimSun', '宋体', serif;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        .hero-container {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('image/background2.jpg width="1200" height="800" viewBox="0 0 1200 800"><rect width="1200" height="800" fill="%23e8e8e0"/><path d="M0,200 L1200,200 L1200,800 L0,800 Z" fill="%23d4d4c3"/><path d="M0,400 L1200,400 L1200,800 L0,800 Z" fill="%23e5e5d9"/><path d="M0,600 L1200,600 L1200,800 L0,800 Z" fill="%23d4d4c3"/><path d="M0,0 C300,-50 500,-30 800,0 C1000,30 1100,50 1200,0 L1200,0 L0,0 Z" fill="%23d4d4c3"/><path d="M0,100 C200,50 400,80 600,50 C700,30 900,60 1100,40 L1200,100 L1200,0 L0,0 Z" fill="%23e5e5d9" opacity="0.5"/><path d="M0,600 C200,550 400,570 600,560 C800,550 1000,570 1200,560 L1200,800 L0,800 Z" fill="%23c4d4c3"/><path d="M0,700 C300,650 500,670 800,660 C900,670 1000,650 1100,660 L1200,700 L1200,800 L0,800 Z" fill="%23d4d4c3"/><path d="M0,300 C200,250 300,280 400,270 C500,260 600,280 700,270 C800,260 900,280 1000,270 C1100,260 1150,270 1200,270 L1200,400 L0,400 Z" fill="%23e5e5d9" opacity="0.7"/></svg>');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .side-nav {
            position: fixed;
            top: 0;
            left: -120px; /* 默认隐藏 */
            width: 120px;
            height: 100vh;
            background-color: rgba(78, 156, 144, 0.95); /* 蓝绿色背景 */
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            transition: left 0.3s ease;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
        }

        .side-nav-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 40px;
            background-color: #f8f3e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #3a8c7d;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .side-nav-item {
            width: 80%;
            margin: 15px 0;
            padding: 12px 0;
            color: #f8f3e9;
            text-align: center;
            border-top: 1px solid rgba(248, 243, 233, 0.3);
            border-bottom: 1px solid rgba(248, 243, 233, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            text-decoration: none; /* 添加这一行 */
        }

        .side-nav-item:hover {
            background-color: rgba(248, 243, 233, 0.2);
            transform: translateX(5px);
        }

        .side-nav-item:hover::before {
            content: "";
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 2px;
            background-color: #f8f3e9;
        }

        .side-nav-text {
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: normal;
            text-shadow: 0 0 2px rgba(0, 0, 0, 0.5);
        }

        .side-nav-icon {
            margin-bottom: 5px;
            font-size: 20px;
        }

        .side-nav-show {
            position: fixed;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            width: 10px;
            height: 50px;
            background-color: rgba(78, 156, 144, 0.7);
            cursor: pointer;
            z-index: 9;
            border-radius: 0 5px 5px 0;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);
            animation: pulse 1.5s infinite;
        }

         @keyframes pulse {
            0% {
                transform: translateY(-50%) scale(1);
                opacity: 1;
            }
            50% {
                transform: translateY(-50%) scale(1.5);
                opacity: 1;
                box-shadow: 2px 0 15px rgba(0, 0, 0, 0.5);
            }
            100% {
                transform: translateY(-50%) scale(1);
                opacity: 1;
            }
        }

        .side-nav-show:hover {
            background-color: rgba(78, 156, 144, 1); /* 蓝绿色背景 */
        }

        .next-page-arrow {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background-color: rgba(78, 156, 144, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: -2px 0 5px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s;
        }

        .next-page-arrow:hover {
            background-color: rgba(78, 156, 144, 1);
        }

        .next-page-arrow:hover .arrow-icon {
            transform: translateX(5px);
        }

        .arrow-icon {
            color: white;
            font-size: 24px;
            transition: transform 0.3s;
        }

        .top-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .control-button {
            width: 40px;
            height: 40px;
            background-color: rgba(78, 156, 144, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.3s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .control-button:hover {
            background-color: rgba(78, 156, 144, 1);
        }

        .control-icon {
            color: white;
            font-size: 20px;
        }

        .help-info {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 300px;
            background-color: rgba(248, 243, 233, 0.95);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 100;
            display: none;
        }

        .help-info h3 {
            font-family: '宋体', cursive;
            color: #3a8c7d;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .help-content-container {
            max-height: 200px;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* 添加首行缩进样式 */
        .help-info p {
            font-family: '宋体', cursive;
            color: black;
            font-size: 14px;
            line-height: 1.6;
            text-indent: 2em; /* 首行缩进两个字符 */
            margin-bottom: 0.5em; /* 调整后的段落间距 */
        }

        @media (max-width: 768px) {
            .side-nav {
                width: 80px;
            }
            
            .side-nav-logo {
                width: 60px;
                height: 60px;
                font-size: 24px;
                margin-bottom: 30px;
            }
            
            .side-nav-text {
                display: none;
            }
            
            .side-nav-item {
                padding: 12px 0;
            }
            
            .next-page-arrow {
                width: 40px;
                height: 40px;
                right: 10px;
            }
            
            .top-controls {
                gap: 10px;
            }
            
            .control-button {
                width: 30px;
                height: 30px;
            }
            
            .help-info {
                width: 250px;
                top: 50px;
                right: 10px;
            }
            
            .help-content-container {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="hero-container">
        <div class="background-image"></div>
        <video id="heroVideo" autoplay muted>
            <source src="av/茶文化视频封面.mp4" type="video/mp4">
            您的浏览器不支持视频标签。
        </video>
    </div>

    <nav class="side-nav">
        <div class="side-nav-logo">茶</div>
        
        <a href="index.html" class="side-nav-item">
            <div class="side-nav-icon">首页</div>
            <div class="side-nav-text">品茗首页</div>
        </a>
    
        <a href="茶典籍.html" class="side-nav-item">
            <div class="side-nav-icon">茶韵</div>
            <div class="side-nav-text">诗词古韵</div>
        </a>
    
        <a href="时间轴.html" class="side-nav-item">
            <div class="side-nav-icon">茶史</div>
            <div class="side-nav-text">千年溯源</div>
        </a>
    
        <a href="茶冲泡.html" class="side-nav-item">
            <div class="side-nav-icon">茶艺</div>
            <div class="side-nav-text">百茶汇萃</div>
        </a>
    
        <a href="中俄贸易.html" class="side-nav-item">
            <div class="side-nav-icon">茶贸</div>
            <div class="side-nav-text">四海飘香</div>
        </a>
    </nav>

    <div class="side-nav-show" id="navShowButton"></div>

    <div class="next-page-arrow" id="nextPageBtn">
        <div class="arrow-icon">›</div>
    </div>

    <div class="top-controls">
        <div class="control-button" id="musicControl">
            <div class="control-icon music-icon">♫</div>
        </div>
        
        <div class="control-button" id="helpButton">
            <div class="control-icon help-icon">?</div>
        </div>
        
        <div class="control-button" id="backButton">
            <div class="control-icon back-icon">←</div>
        </div>
    </div>

    <div class="help-info" id="helpInfo">
        <h3 id="helpTitle">茶韵数观</h3>
        <div class="help-content-container">
            <p>欢迎来到《茶韵数观：中国古代茶文化图鉴》展示页面。</p>
            
            <p>本网站展示了茶在典籍诗词中的踪迹、关键历史节点的演进、历代饮茶风尚的变迁、茶馆在不同时代的社会功能、茶文化的海外传播等丰富内容。</p>
            
            <p>通过左侧导航栏可以浏览不同的茶文化主题，右上角音符可以控制背景音乐的开关，问号可以了解页面的数据分析结果和数据来源，返回按钮可以返回上个页面，右侧箭头可以跳转到下一个页面。</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('heroVideo');
            video.addEventListener('ended', function() {
                video.pause();
            });

            let currentPageIndex = 0;
            
            const pages = ['index.html', '茶典籍.html', '茶诗.html', '时间轴.html', '茶种植地域.html', '茶冲泡.html', '茶馆1.html', '茶馆2.html', '中俄贸易.html', '中英贸易.html', '中荷贸易.html', '中美贸易.html'];
            const currentPage = window.location.pathname.split('/').pop();
            currentPageIndex = pages.indexOf(currentPage) !== -1 ? pages.indexOf(currentPage) : 0;
            
            document.getElementById('nextPageBtn').addEventListener('click', function() {
                if (currentPageIndex < pages.length - 1) {
                    currentPageIndex++;
                    window.location.href = pages[currentPageIndex];
                } else {
                    window.location.href = pages[0];
                }
            });
            
            document.getElementById('backButton').addEventListener('click', function() {
                if (currentPageIndex > 0) {
                    currentPageIndex--;
                    window.location.href = pages[currentPageIndex];
                } else {
                    window.location.href = pages[pages.length - 1];
                }
            });
            
            const backgroundMusic = new Audio('av/中央民族乐团 - 渔舟唱晚.mp3');
            backgroundMusic.loop = true;
            let isPlaying = false;
            
            const musicControl = document.getElementById('musicControl');
            const storedIsPlaying = localStorage.getItem('isPlaying');
            if (storedIsPlaying === 'true') {
                backgroundMusic.play().catch(e => console.log('播放音乐出错:', e));
                musicControl.innerHTML = '<div class="control-icon music-icon">🔊</div>';
                isPlaying = true;
            }
            
            backgroundMusic.addEventListener('play', function() {
                localStorage.setItem('isPlaying', 'true');
            });
            
            backgroundMusic.addEventListener('pause', function() {
                localStorage.setItem('isPlaying', 'false');
            });
            
            musicControl.addEventListener('click', function() {
                if (isPlaying) {
                    backgroundMusic.pause();
                    this.innerHTML = '<div class="control-icon music-icon">♫</div>';
                    isPlaying = false;
                } else {
                    backgroundMusic.play().catch(e => console.log('播放音乐出错:', e));
                    this.innerHTML = '<div class="control-icon music-icon">🔊</div>';
                    isPlaying = true;
                }
            });
            
            document.getElementById('helpButton').addEventListener('click', function() {
                const helpInfo = document.getElementById('helpInfo');
                if (helpInfo.style.display === 'block') {
                    helpInfo.style.display = 'none';
                } else {
                    helpInfo.style.display = 'block';
                }
            });
            
            document.querySelector('.side-nav-show').addEventListener('mouseover', function() {
                document.querySelector('.side-nav').style.left = '0';
            });
            
            document.querySelector('.side-nav').addEventListener('mouseleave', function() {
                this.style.left = '-120px';
            });
            
            document.querySelector('.side-nav').style.left = '-120px';
            
            window.addEventListener('beforeunload', function() {
                localStorage.setItem('isPlaying', isPlaying ? 'true' : 'false');
            });
        });
    </script>
</body>
</html>
